<!DOCTYPE html> 
<html> 
    <head> 
        <title>Donate!</title>
        <meta charset="utf-8">
        <style>
            body {
                background-color: #000000;
                color: #ffffff;
                font-family: Arial, Helvetica, sans-serif;
            }
            h1 {
                text-align: center;
            }
            p {
                text-align: center;
            }
            img {
                display: block;
                margin-left: auto;
                margin-right: auto;
            }
            button {
                display: block;
                margin-left: auto;
                margin-right: auto;
            }
        </style> 
    </head> 
    <body> 
        <h1>Donation Page</h1> 
        <p> Hello, and welcome to my donation page.</p>
        <p> If you like any of my projects, or if you're just feeling generous
        then please consider donating to me.
        </p><hr>
        <img src="https://sdk.paylike.io/visa.svg" alt="visa" width="100" height="100">
        <img src="https://sdk.paylike.io/mastercard.svg" alt="mastercard" width="100" height="100">
        <hr>
        <button onClick="pay();">Donate!</button>
        <br>
        <a href="terms.html">Terms</a>

<script src="https://sdk.paylike.io/10.js"></script>
<script>
  const paylike = Paylike({key: '6f02f6cc-092d-4cfd-9ef2-dee17b301598'})

  function pay(){
    paylike.pay(
      {
        test: true,
        amount: {currency: 'GBP', exponent: 2, value: 2499},
        custom: {orderId: 1234},
      },
      (err, result) => {
        if (err) return console.log(err)
        console.log(result.transaction.id)
        location.href = '/';
      }
    )
  }
</script>
    </body> 
</html>
