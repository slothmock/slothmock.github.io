<!DOCTYPE html> 
<html> 
    <head> 
        <title>Donate!</title> 
    </head> 
    <body> 
        <h1>Donation Page</h1> 
        <p> Hello, I'm online, and everyone can see me! </p>
        <br>
        <p> If any of my projects have helped, or you're just feeling generous
        then please consider donating to me.
        </p> 
        <hr>
        <button onClick="pay();">Pay</button>
        <img src="https://sdk.paylike.io/visa.svg" alt="Paylike" width="100" height="100">
        <img src="https://sdk.paylike.io/mastercard.svg" alt="Paylike" width="100" height="100">
        <hr>

<script src="https://sdk.paylike.io/10.js"></script>
<script>
  const paylike = Paylike({key: '594b1949-2b6b-410e-9482-741c02dbf777'})

  function pay(){
    paylike.pay(
      {
        test: true,
        amount: {currency: 'GBP', exponent: 2, value: 3499},
        custom: {orderId: 1234},
      },
      (err, result) => {
        if (err) return console.log(err)
        console.log(result.transaction.id)
        location.href = '/';
      }
    )
  }
</script>
    </body> 
</html>
